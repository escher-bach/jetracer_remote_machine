services:
  jetracer-remote:
    build:
      context: .
      dockerfile: Dockerfile
    image: jetracer-remote:latest
    container_name: jetracer_remote
    network_mode: "host"
    ipc: "host"

    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      # WSLg / X11 GUI passthrough
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}

    volumes:
      # WSLg X11 and Wayland sockets for GUI passthrough
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
      # Mount source for active development (hot-reload without rebuild)
      - ./jetracer_remote:/ros2_ws/src/jetracer_remote

    privileged: true

    tty: true
    stdin_open: true

  zenoh-bridge:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: jetracer_remote_zenoh
    ports:
      - "7447:7447/tcp"
      - "7447:7447/udp"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_DISTRO=humble
      # Comma-separated list of robot IPs, e.g. 192.168.0.22,192.168.0.31
      - ROBOT_IPS=${ROBOT_IPS}
    volumes:
      - ./zenoh_entrypoint.sh:/zenoh_entrypoint.sh:ro
    entrypoint: ["/bin/ash", "/zenoh_entrypoint.sh"]
